name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - id: version
        name: Check versions
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          cargo = tomllib.loads(pathlib.Path("Cargo.toml").read_text())["package"]["version"]
          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          if cargo != pyproject:
              raise SystemExit(f"Cargo.toml version {cargo} != pyproject.toml version {pyproject}")

          ref_type = os.environ.get("GITHUB_REF_TYPE")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          is_tag = ref_type == "tag"
          if is_tag:
              expected = f"v{cargo}"
              if ref_name != expected:
                  raise SystemExit(f"release tag {ref_name} does not match package version {cargo}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={cargo}", file=output)
              print(f"is_tag={str(is_tag).lower()}", file=output)
          print(f"version={cargo}")
          PY
      - name: Release checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked --all-features
          cargo package --locked

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  linux-wheels:
    name: Linux wheel (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2014"
          args: --release --out dist
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  windows-wheels:
    name: Windows wheel
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist/*.whl
          if-no-files-found: error

  macos-wheels:
    name: macOS wheel (${{ matrix.target }})
    runs-on: macos-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [validate, sdist, linux-wheels, windows-wheels, macos-wheels]
    if: needs.validate.outputs.is_tag == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -lh dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate, sdist, linux-wheels, windows-wheels, macos-wheels]
    if: needs.validate.outputs.is_tag == 'true'
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate]
    if: needs.validate.outputs.is_tag == 'true'
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
