name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1

  rust-test:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test all features
        run: cargo test --locked --all-features

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check version metadata
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          cargo = tomllib.loads(pathlib.Path("Cargo.toml").read_text())["package"]["version"]
          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          if cargo != pyproject:
              raise SystemExit(f"Cargo.toml version {cargo} != pyproject.toml version {pyproject}")
          print(f"version={cargo}")
          PY
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Documentation
        run: cargo doc --locked --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Package crate
        run: cargo package --locked
      - name: Compile benchmarks
        run: cargo bench --locked --all-features --no-run

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75
      - uses: Swatinem/rust-cache@v2
      - name: Check advertised Rust version
        run: cargo check --locked --all-features

  python-wheel:
    name: Python wheel smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
          sccache: "true"
      - name: Install wheel and test Python API
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install --force-reinstall dist/*.whl
          python -m pytest tests/python -q
